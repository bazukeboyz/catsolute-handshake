<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Staff Controller - Grand Countdown</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #f8fafc;
            --primary: #3b82f6;
            --success: #16a34a;
            --warning: #ea580c;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.1);
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 15px; }
        h1 { font-size: 1.3rem; text-align: center; color: #38bdf8; margin: 5px 0; }
        
        .band-section { margin-bottom: 25px; background: rgba(255,255,255,0.02); padding: 14px; border-radius: 16px; border: 1px solid var(--border); }
        .band-title { font-size: 1.4rem; font-weight: 900; margin: 0 0 12px 5px; padding-left: 10px; }
        
        .title-sora { color: #f472b6; border-left: 5px solid #f472b6; }
        .title-yami { color: #fbbf24; border-left: 5px solid #fbbf24; }
        .title-mirai { color: #38bdf8; border-left: 5px solid #38bdf8; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 12px; }
        
        .member-card { background: #1e293b; border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .top-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .info-zone { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
        .avatar-mini { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #475569; flex-shrink: 0; }
        .name-label { font-size: 1.15rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        
        .timer-badge { font-family: monospace; font-size: 1.4rem; font-weight: bold; color: #38bdf8; background: #0f172a; padding: 2px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }

        .booth-select { flex-shrink: 0; width: 72px; height: 30px; font-size: 0.85rem; font-weight: 700; text-align: center; color: #fff; background: #0f172a; border: 1px solid var(--border); border-radius: 6px; }
        .booth-select.has-booth { border-color: #38bdf8; color: #38bdf8; }
        
        .bottom-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
        .control-zone { display: flex; align-items: center; gap: 4px; }
        
        .btn-ctrl { width: 32px; height: 34px; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-minus { background-color: #ea580c; }
        .btn-plus { background-color: var(--primary); }
        
        .input-tickets { width: 52px; height: 34px; text-align: center; font-size: 1.1rem; font-weight: 700; background: #0f172a; border: 1px solid var(--border); color: #fff; border-radius: 6px; }
        
        .btn-action-timer { padding: 0 12px; height: 34px; font-size: 0.85rem; font-weight: bold; border: none; border-radius: 6px; color: white; cursor: pointer; min-width: 85px; }
        .btn-start { background-color: var(--success); }
        .btn-pause { background-color: #eab308; color: #000; }
        
        .btn-clear { background: transparent; border: 1px solid #64748b; color: #94a3b8; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; cursor: pointer; }
        
        .member-card.running { border-color: var(--success); background: #14251c; }
        .member-card.timeout { border-color: var(--danger); background: #281416; }
    </style>
</head>
<body>

    <h1>🎛️ Central Staff Countdown Controller</h1>
    <div style="text-align:center; font-size:0.85rem; color:#94a3b8; margin-bottom:15px;">(คุมเวลาแบบรวมยอดก้อนเดียว ไม่ต้องสับเปลี่ยนทุก 30 วินาที)</div>

    <div class="band-section">
        <div class="band-title title-sora">Sora! Sora!</div>
        <div class="grid-container" id="grid-sora"></div>
    </div>

    <div class="band-section">
        <div class="band-title title-yami">Yami Yami</div>
        <div class="grid-container" id="grid-yami"></div>
    </div>

    <div class="band-section">
        <div class="band-title title-mirai">Mirai Mirai</div>
        <div class="grid-container" id="grid-mirai"></div>
    </div>

    <script>
        const socket = io();
        let slotStates = {};

        const soraList = [{id:'ame', name:'Ame'}, {id:'best', name:'Best'}, {id:'jennie', name:'Jennie'}, {id:'kitty', name:'Kitty'}, {id:'lilin', name:'Lilin'}, {id:'minmin', name:'Minmin'}, {id:'oum', name:'Oum'}, {id:'pin', name:'Pin'}];
        const yamiList = [{id:'eri', name:'Eri'}, {id:'haru', name:'Haru'}, {id:'jan', name:'Jan'}, {id:'kwang', name:'Kwang'}, {id:'nori', name:'Nori'}, {id:'praew', name:'Praew'}, {id:'punch', name:'Punch'}, {id:'tonliw', name:'Tonliw'}, {id:'xiuzhen', name:'Xiu Zhen'}];
        const miraiList = [{id:'alice', name:'Alice'}, {id:'gracenae', name:'Gracenae'}, {id:'kartun', name:'Kartun'}, {id:'kris', name:'Kris'}, {id:'mickey', name:'Mickey'}, {id:'nisa', name:'Nisa'}, {id:'pear', name:'Pear'}, {id:'pixels', name:'Pixels'}, {id:'sai', name:'Sai'}];

        function drawGrid(containerId, list) {
            const container = document.getElementById(containerId);
            container.innerHTML = list.map(m => {
                slotStates[m.id] = { currentStatus: 'idle' };
                return `
                    <div class="member-card" id="card-${m.id}">
                        <div class="top-row">
                            <div class="info-zone">
                                <img class="avatar-mini" src="img/${m.id}.jpg" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'44\\' height=\\'44\\'><rect width=\'44\\' height=\'44\\' fill=\'%23475569\\'/><text x=\'50%\\' y=\'60%\\' font-size=\'22\\' text-anchor=\'middle\'>👤</text></svg>'">
                                <div class="name-label">${m.name}</div>
                            </div>
                            <select class="booth-select" id="booth-${m.id}" onchange="boothChanged('${m.id}', '${m.name}')">
                                <option value="">บูท?</option>
                                <optgroup label="L">
                                    <option value="L1">L1</option>
                                    <option value="L2">L2</option>
                                    <option value="L3">L3</option>
                                    <option value="L4">L4</option>
                                </optgroup>
                                <optgroup label="C">
                                    <option value="C1">C1</option>
                                    <option value="C2">C2</option>
                                    <option value="C3">C3</option>
                                    <option value="C4">C4</option>
                                </optgroup>
                                <optgroup label="R">
                                    <option value="R1">R1</option>
                                    <option value="R2">R2</option>
                                    <option value="R3">R3</option>
                                    <option value="R4">R4</option>
                                    <option value="R5">R5</option>
                                    <option value="R6">R6</option>
                                    <option value="R7">R7</option>
                                </optgroup>
                            </select>
                            <div class="timer-badge" id="clock-${m.id}">00:00</div>
                        </div>
                        <div class="bottom-row">
                            <div class="control-zone">
                                <button class="btn-ctrl btn-minus" onclick="stepTicket('${m.id}', -1, '${m.name}')">−</button>
                                <input type="number" class="input-tickets" id="input-${m.id}" value="0" min="0" onchange="inputChanged('${m.id}', '${m.name}')">
                                <button class="btn-ctrl btn-plus" onclick="stepTicket('${m.id}', 1, '${m.name}')">+</button>
                            </div>
                            <button class="btn-action a-btn" id="btn-time-${m.id}" onclick="toggleTimer('${m.id}')">START</button>
                            <button class="btn-clear" onclick="clearRow('${m.id}')">ล้าง</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        drawGrid('grid-sora', soraList);
        drawGrid('grid-yami', yamiList);
        drawGrid('grid-mirai', miraiList);

        // 💡 2. เมื่อกดปุ่มบวกลบ ยอดบัตรจะคำนวณสะสมและยิงข้อมูลไปปรับวินาทีถอยหลังกลางอากาศอัตโนมัติ
        function stepTicket(memberId, amount, memberName) {
            const input = document.getElementById(`input-${memberId}`);
            let newVal = (parseInt(input.value) || 0) + amount;
            if (newVal < 0) newVal = 0;
            input.value = newVal;

            socket.emit('update_input_stack', { memberId, tickets: newVal, name: memberName });
        }

        function inputChanged(memberId, memberName) {
            const input = document.getElementById(`input-${memberId}`);
            let newVal = parseInt(input.value) || 0;
            if (newVal < 0) newVal = 0;
            socket.emit('update_input_stack', { memberId, tickets: newVal, name: memberName });
        }

        // 📍 เลือกตำแหน่งบูทจาก Dropdown แล้วส่งไปอัปเดตที่ฝั่ง Server ทันที
        function boothChanged(memberId, memberName) {
            const select = document.getElementById(`booth-${memberId}`);
            select.classList.toggle('has-booth', !!select.value);
            socket.emit('set_booth', { memberId, booth: select.value, name: memberName });
        }

        function toggleTimer(memberId) {
            const state = slotStates[memberId].currentStatus;
            if (state === 'running') {
                socket.emit('pause_queue', { memberId });
            } else {
                const input = document.getElementById(`input-${memberId}`);
                if ((parseInt(input.value) || 0) <= 0) {
                    return alert('กรุณาใส่จำนวนตั๋วคิวก่อนกดปุ่ม START ครับ');
                }
                socket.emit('trigger_manual_start', { memberId });
            }
        }

        function clearRow(memberId) {
            if(confirm('ต้องการเคลียร์ล้างคิวและเวลาของเมมเบอร์คนนี้ใช่หรือไม่?')) {
                socket.emit('reset_queue', { memberId });
            }
        }

        function updateCardUI(memberId, data) {
            const { totalSeconds, status, queueStack, booth } = data;
            slotStates[memberId].currentStatus = status;

            // ตัวเลขยอดตั๋วอัปเดตไหลตามวินาทีที่วิ่งโดยอัตโนมัติ
            document.getElementById(`input-${memberId}`).value = queueStack || 0;

            // ซิงค์ตำแหน่งบูทให้ตรงกันทุกหน้าจอสตาฟฟ์ (เผื่อมีคนอื่นแก้จากเครื่องอื่น)
            const boothSelect = document.getElementById(`booth-${memberId}`);
            if (boothSelect && booth !== undefined) {
                boothSelect.value = booth || '';
                boothSelect.classList.toggle('has-booth', !!booth);
            }

            const min = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const sec = String(totalSeconds % 60).padStart(2, '0');
            document.getElementById(`clock-${memberId}`).textContent = `${min}:${sec}`;

            const card = document.getElementById(`card-${memberId}`);
            const btn = document.getElementById(`btn-time-${memberId}`);
            card.className = `member-card ${status}`;

            if (status === 'running') {
                btn.textContent = "PAUSE";
                btn.className = "btn-action-timer btn-pause";
            } else {
                btn.textContent = "START";
                btn.className = "btn-action-timer btn-start";
            }
        }

        socket.on('init_all_lanes', (allLanes) => {
            if (allLanes) {
                Object.keys(allLanes).forEach(id => {
                    if(document.getElementById(`card-${id}`)) updateCardUI(id, allLanes[id]);
                });
            }
        });

        socket.on('lane_updated', (payload) => {
            if (document.getElementById(`card-${payload.memberId}`)) {
                updateCardUI(payload.memberId, payload.data);
            }
        });

        socket.on('lane_reseted', (payload) => {
            const id = payload.memberId;
            if (document.getElementById(`card-${id}`)) {
                document.getElementById(`input-${id}`).value = 0;
                document.getElementById(`clock-${id}`).textContent = "00:00";
                document.getElementById(`card-${id}`).className = "member-card idle";
                const btn = document.getElementById(`btn-time-${id}`);
                btn.textContent = "START";
                btn.className = "btn-action-timer btn-start";
                slotStates[id] = { currentStatus: 'idle' };
            }
        });
    </script>
</body>
</html>
