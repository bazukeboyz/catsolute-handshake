<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dashboard - BGG Core Focus</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text-main: #2d3748;
            --text-sub: #4a5568;
            --success-border: #81c784;
            --success-bg: rgba(232, 245, 233, 0.8);
            --idle-border: #c4b5fd;
            --idle-bg: rgba(245, 243, 255, 0.7);
        }

        * { box-sizing: border-box; }

        body { 
            background-image: url('img/BGG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: system-ui, -apple-system, sans-serif; 
            padding: 20px; 
            margin: 0; 
            min-height: 100vh;
        }

        .header-dash { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); padding: 12px 25px; border-radius: 14px; margin-bottom: 20px; box-shadow: 0 4px 20px 0 rgba(162, 142, 179, 0.15); }
        .header-dash h1 { margin: 0; font-size: 1.5rem; font-weight: 800; background: linear-gradient(45deg, #6b46c1, #b83280); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 0.5px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 1400px; margin: 0 auto; }
        /* เมื่อมีเมมเบอร์เกิน 10 คน สลับเป็น 3 คอลัมน์เพื่อให้ครบ 14 ใบในจอเดียวโดยไม่ตกขอบ */
        .grid.cols-3 { grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .card { background: var(--glass-bg); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid var(--glass-border); border-radius: 18px; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 15px; box-shadow: 0 6px 20px 0 rgba(142, 148, 179, 0.12); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s ease, opacity 0.5s ease; opacity: 1; }
        /* โหมดย่อขนาด: ซ่อนรูปและลด padding เพื่อเพิ่มพื้นที่แสดงผลตอนมีเลนจำนวนมาก */
        .card.compact { padding: 10px 14px; gap: 8px; }
        .card.compact .member-avatar { display: none; }

        .profile-section { display: flex; align-items: center; gap: 18px; flex: 1; min-width: 0; }
        .member-avatar { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08); background: #e2e8f0; flex-shrink: 0; }

        /* ป้ายตำแหน่งบูท: ไม่ถูกซ่อนโดยปุ่มซ่อนตัวเลข เพราะอยู่ใน profile-section ไม่ใช่ status-section */
        .booth-badge { color: #fff; font-weight: 900; font-size: 1.7rem; padding: 6px 14px; border-radius: 10px; flex-shrink: 0; min-width: 56px; text-align: center; }
        .card.compact .booth-badge { font-size: 1.3rem; padding: 4px 9px; min-width: 44px; }

        /* สีพื้นหลังแยกตามโซน: L = น้ำเงิน, C = เขียว, R =ส้ม/แดง */
        .booth-badge.group-L { background: #2563eb; }
        .booth-badge.group-C { background: #16a34a; }
        .booth-badge.group-R { background: #dc2626; }
        
        .name-box { 
            display: flex; 
            flex-direction: column; 
            min-width: 0; 
            gap: 2px; 
            justify-content: center; /* จัดตำแหน่งกึ่งกลางแนวดิ่งอย่างสวยงามแทนที่ข้อความเดิม */
        }
        
        /* 💡 🌟 ปรับขนาดชื่อศิลปินของระบบที่ 2 ให้ใหญ่สะดุดตาพิเศษระนาบเดียวกัน */
        .name { 
            font-size: 2.8rem; 
            font-weight: 900; 
            color: #3b0d3d; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            line-height: 1.1; 
        }
        
        .status-section { display: flex; align-items: center; gap: 10px; }

        /* กล่องข้อมูลแยกเป็นใบย่อย: ตัวเลขใหญ่เด่น ส่วนข้อความหน่วยเล็กพอประมาณ */
        .info-chip { display: flex; align-items: baseline; gap: 5px; background: rgba(255, 255, 255, 0.75); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 12px; padding: 8px 14px; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .info-chip .chip-text { font-size: 0.8rem; color: #64748b; font-weight: 600; }
        .info-chip .chip-number { font-size: 1.8rem; font-weight: 900; color: #b83280; line-height: 1; }

        .card.compact .info-chip { padding: 5px 10px; gap: 3px; }
        .card.compact .info-chip .chip-text { font-size: 0.65rem; }
        .card.compact .info-chip .chip-number { font-size: 1.3rem; }

        .toggle-numbers-btn { padding: 8px 16px; font-size: 0.85rem; font-weight: 700; color: #4a154b; background: rgba(255, 255, 255, 0.6); border: 1px solid var(--glass-border); border-radius: 20px; cursor: pointer; }
        .toggle-numbers-btn.active { background: #6b46c1; color: #fff; border-color: #6b46c1; }

        /* โหมดซ่อนตัวเลข: เหลือแค่รูปและชื่อเมมเบอร์บนจอ Dashboard */
        body.numbers-hidden .status-section { display: none; }

        /* การ์ดที่โชว์เพราะมีบูทอย่างเดียว (ยังไม่มีคิวค้าง) ใช้สีกลางๆ แทนสีเขียว "กำลังคุยอยู่" */
        .card.idle-booth { background: var(--idle-bg); border-color: var(--idle-border); }
        .card.idle-booth .member-avatar { border-color: var(--idle-border); }
    </style>
</head>
<body>

    <header class="header-dash">
        <h1>THE UPRISING PROJECT - LIVE MONITOR</h1>
        <div style="font-size: 0.95rem; font-weight: 600; color: var(--text-sub); display: flex; align-items: center; gap: 12px;">
            ✨ Handshake & Talk 30 Sec.
            <button class="toggle-numbers-btn" id="toggle-numbers-btn" onclick="toggleNumbers()">👁️ ซ่อนตัวเลขทั้งหมด</button>
        </div>
    </header>

    <div class="grid" id="monitor-grid"></div>

    <script>
        const socket = io();
        const grid = document.getElementById('monitor-grid');
        let lanesDataStore = {};
        let clearTimeouts = {};

        // ลำดับการแสดงผลตามตำแหน่งบูทที่ตายตัว: L1-L4, C1-C4, R1-R5
        const BOOTH_ORDER = ['L1','L2','L3','L4','C1','C2','C3','C4','R1','R2','R3','R4','R5'];

        // ปุ่มเดียวสลับซ่อน/แสดงตัวเลข "รอกี่นาที" และ "คิวสะสมกี่ใบ" ของทุกการ์ดพร้อมกัน เหลือไว้แค่รูป+ชื่อ
        function toggleNumbers() {
            const isHidden = document.body.classList.toggle('numbers-hidden');
            const btn = document.getElementById('toggle-numbers-btn');
            btn.textContent = isHidden ? '👁️ แสดงตัวเลขทั้งหมด' : '👁️ ซ่อนตัวเลขทั้งหมด';
            btn.classList.toggle('active', isHidden);
        }

        // คำนวณขนาดฟอนต์ชื่อแบบไดนามิก: ชื่อยาวกว่า 5 ตัวอักษรจะถูกย่อขนาดลงเพื่อไม่ให้ล้นกรอบ/ถูกตัด (...)
        function getNameFontSize(name, compact) {
            const len = (name || '').length;
            let size = 2.8;
            if (len > 9) size = 1.5;
            else if (len > 7) size = 1.8;
            else if (len > 5) size = 2.2;
            // โหมดย่อ (เกิน 10 เลน) ไม่ต้องลดขนาดมากนัก เพราะซ่อนรูปแล้วมีพื้นที่ฝั่งชื่อเหลือเยอะ
            if (compact) size = size * 0.85;
            return size.toFixed(2);
        }

        function renderSortedGrid() {
            let sortedLanes = Object.keys(lanesDataStore).map(id => {
                return { memberId: id, ...lanesDataStore[id] };
            });

            // แสดงเลนที่มีคิวค้างอยู่ หรือเลนที่ถูกระบุตำแหน่งบูทไว้แล้ว (แม้ยังไม่มีคิวก็ต้องโชว์ตำแหน่งบูท)
            let activeLanes = sortedLanes.filter(l => (l.queueStack || 0) > 0 || l.booth);

            // เรียงตามตำแหน่งบูทตายตัว (L1→L4, C1→C4, R1→R5) ก่อน ส่วนเลนที่ไม่มีบูทให้ไปอยู่ท้ายสุดเรียงตามคิวมาก→น้อย
            activeLanes.sort((a, b) => {
                const idxA = BOOTH_ORDER.indexOf(a.booth);
                const idxB = BOOTH_ORDER.indexOf(b.booth);
                const rankA = idxA === -1 ? BOOTH_ORDER.length : idxA;
                const rankB = idxB === -1 ? BOOTH_ORDER.length : idxB;
                if (rankA !== rankB) return rankA - rankB;
                return (b.queueStack || 0) - (a.queueStack || 0);
            });

            let top14Lanes = activeLanes.slice(0, 14);

            // เกิน 10 เลนขึ้นไป สลับเป็น 3 คอลัมน์ + ซ่อนรูปเพื่อให้แสดงครบ 14 เลนในจอเดียว
            const isCompact = top14Lanes.length > 10;
            grid.className = isCompact ? 'grid cols-3' : 'grid';
            grid.innerHTML = '';

            top14Lanes.forEach(lane => {
                const qStack = lane.queueStack || 0;
                const waitMinutes = Math.ceil((qStack * 30) / 60);
                const nameFontSize = getNameFontSize(lane.name, isCompact);
                // จัดกลุ่มสีตามอักษรตัวแรกของบูท: L/C/R
                const boothGroup = lane.booth ? `group-${lane.booth.charAt(0)}` : '';

                const card = document.createElement('div');
                card.id = `card-${lane.memberId}`;
                // ถ้ายังไม่มีคิวค้าง (มาโชว์เพราะมีบูทเฉยๆ) ให้ใช้สไตล์กลางๆ แทนสีเขียว "กำลังคุยอยู่"
                card.className = `card ${qStack > 0 ? 'running' : 'idle-booth'}${isCompact ? ' compact' : ''}`;

                // 💡 🌟 นำเอาข้อความ "เลนกำลังเปิดให้บริการ" ออก และใช้โครงสร้างชื่อแบบขยายใหญ่พิเศษ
                card.innerHTML = `
                    <div class="profile-section">
                        ${lane.booth ? `<div class="booth-badge ${boothGroup}">${lane.booth}</div>` : ''}
                        <img class="member-avatar" src="img/${lane.memberId}.jpg" alt="${lane.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'75\' height=\'75\' viewBox=\'0 0 75 75\'><rect width=\'75\' height=\'75\' fill=\'%23cbd5e1\'/><text x=\'50%\' y=\'55%\' font-family=\'sans-serif\' font-size=\'32\' fill=\'%2364748b\' text-anchor=\'middle\'>👤</text></svg>'">
                        <div class="name-box">
                            <div class="name" style="font-size:${nameFontSize}rem">${lane.name}</div>
                        </div>
                    </div>
                    <div class="status-section">
                        <div class="info-chip">
                            <span class="chip-text">รอ ~</span>
                            <span class="chip-number">${waitMinutes}</span>
                            <span class="chip-text">นาที</span>
                        </div>
                        <div class="info-chip">
                            <span class="chip-text">คิวสะสม</span>
                            <span class="chip-number">${qStack}</span>
                            <span class="chip-text">ใบ</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function processLaneUpdate(memberId, name, totalSeconds, status, tickets, queueStack = 0, booth = '') {
            if (clearTimeouts[memberId]) { clearTimeout(clearTimeouts[memberId]); delete clearTimeouts[memberId]; }

            lanesDataStore[memberId] = { name, totalSeconds, status, tickets, queueStack, booth };

            // ถ้ามีตำแหน่งบูทผูกไว้ ไม่ต้องลบการ์ดออกแม้คิวจะหมด เพื่อให้ตำแหน่งบูทโชว์ค้างไว้ตลอด
            if ((status === 'timeout' || status === 'idle') && queueStack === 0 && !booth) {
                clearTimeouts[memberId] = setTimeout(() => {
                    delete lanesDataStore[memberId];
                    renderSortedGrid();
                    delete clearTimeouts[memberId];
                }, 10000);
            }
            renderSortedGrid();
        }

        socket.on('init_all_lanes', (allLanes) => {
            lanesDataStore = {}; 
            if (allLanes) {
                Object.keys(allLanes).forEach(id => {
                    const lane = allLanes[id];
                    lanesDataStore[id] = { name: lane.name, totalSeconds: lane.totalSeconds || 0, status: lane.status || 'idle', tickets: lane.tickets || 0, queueStack: lane.queueStack || 0, booth: lane.booth || '' };
                });
            }
            renderSortedGrid();
        });
        
        socket.on('lane_updated', (payload) => {
            if (!payload || !payload.memberId || !payload.data) return;
            const name = lanesDataStore[payload.memberId] ? lanesDataStore[payload.memberId].name : payload.memberId.toUpperCase();
            processLaneUpdate(payload.memberId, name, payload.data.totalSeconds, payload.data.status, payload.data.tickets, payload.data.queueStack, payload.data.booth);
        });
        
        socket.on('lane_reseted', (payload) => { 
            if (!payload || !payload.memberId) return;
            if (clearTimeouts[payload.memberId]) clearTimeout(clearTimeouts[payload.memberId]);
            delete lanesDataStore[payload.memberId]; 
            renderSortedGrid();
        });
    </script>
</body>
</html>
